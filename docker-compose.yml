version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    command: mosquitto -c /mosquitto/mosquitto.conf
    configs:
      - source: mosquitto_conf
        target: /mosquitto/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./clickhouse/downsampling.sql:/docker-entrypoint-initdb.d/02-downsampling.sql:ro
    environment:
      CLICKHOUSE_DB: shuidui
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: shuidui
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      API_PORT: 8080
      RUST_LOG: info
    depends_on:
      clickhouse:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      CAM_PROFILE: harmonic
      GRAIN_TYPE: rice
      INTERVAL: "1.0"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  clickhouse_data:

configs:
  mosquitto_conf:
    content: |
      persistence true
      persistence_location /mosquitto/data
      log_dest stdout
      listener 1883
      allow_anonymous true
