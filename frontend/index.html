<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代水碓凸轮机构动力学仿真与舂捣力优化系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 2px solid #e94560;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #e94560, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .status {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.warning {
            background: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
        }

        .status-dot.critical {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
            animation: pulse-fast 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto auto;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 60px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        .panel h2 {
            font-size: 16px;
            color: #f39c12;
            margin-bottom: 10px;
            border-left: 3px solid #e94560;
            padding-left: 10px;
        }

        .panel-3d {
            grid-row: span 2;
            position: relative;
            overflow: hidden;
        }

        #canvas-3d {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        .cam-panel {
            display: flex;
            flex-direction: column;
        }

        #cam-canvas {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            width: 100%;
        }

        .chart-panel {
            grid-column: 2;
        }

        #force-chart {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .data-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .data-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .data-card .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .data-card .value {
            font-size: 20px;
            font-weight: bold;
            color: #4ade80;
        }

        .data-card .unit {
            font-size: 12px;
            color: #888;
            margin-left: 4px;
        }

        .data-card.warning .value {
            color: #f59e0b;
        }

        .data-card.critical .value {
            color: #ef4444;
        }

        .alerts-panel {
            max-height: 200px;
            overflow-y: auto;
        }

        .alert-item {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease;
        }

        .alert-item.warning {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .alert-item.info {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-item .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .alert-item .alert-type {
            font-weight: bold;
            font-size: 13px;
        }

        .alert-item .alert-time {
            font-size: 11px;
            color: #888;
        }

        .alert-item .alert-msg {
            font-size: 12px;
            color: #ccc;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .controls select,
        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .controls button.primary {
            background: #e94560;
            border-color: #e94560;
        }

        .controls button.primary:hover {
            background: #d63952;
        }

        .optimization-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .optimization-form label {
            font-size: 12px;
            color: #aaa;
        }

        .optimization-form input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .stat-item .stat-label {
            font-size: 11px;
            color: #888;
        }

        .stat-item .stat-value {
            font-size: 16px;
            color: #f39c12;
            font-weight: bold;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .tab-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ 古代水碓凸轮机构动力学仿真与舂捣力优化系统</h1>
        <div class="status">
            <div class="status-item">
                <div class="status-dot" id="connection-status"></div>
                <span id="connection-text">系统运行中</span>
            </div>
            <div class="status-item">
                <span>当前设备:</span>
                <select id="device-select">
                    <option value="shuidui-001">汉代一号水碓</option>
                    <option value="shuidui-002">汉代二号水碓</option>
                    <option value="shuidui-003">汉代三号水碓</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="panel panel-3d">
            <h2>水碓三维模型</h2>
            <canvas id="canvas-3d"></canvas>
            <div class="stats-grid" style="position: absolute; bottom: 20px; left: 20px; right: 20px;">
                <div class="stat-item">
                    <div class="stat-label">凸轮转角</div>
                    <div class="stat-value" id="cam-angle-display">0.0°</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">碓头位置</div>
                    <div class="stat-value" id="duitou-position">0.00 m</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">水轮转速</div>
                    <div class="stat-value" id="wheel-speed">0.00 rad/s</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">冲击能量</div>
                    <div class="stat-value" id="impact-energy">0.00 J</div>
                </div>
            </div>
        </div>

        <div class="panel cam-panel">
            <h2>凸轮机构运动学</h2>
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="profile">轮廓曲线</button>
                <button class="tab-btn" data-tab="velocity">速度曲线</button>
                <button class="tab-btn" data-tab="acceleration">加速度曲线</button>
            </div>
            <canvas id="cam-canvas"></canvas>
        </div>

        <div class="panel chart-panel">
            <h2>舂捣力动态柱状图</h2>
            <canvas id="force-chart"></canvas>
            <div class="data-panel" style="margin-top: 10px;">
                <div class="data-card" id="force-card">
                    <div class="label">瞬时舂捣力</div>
                    <div class="value"><span id="pounding-force">0</span><span class="unit">N</span></div>
                </div>
                <div class="data-card" id="vibration-card">
                    <div class="label">机架振动</div>
                    <div class="value"><span id="vibration-value">0</span><span class="unit">m/s²</span></div>
                </div>
                <div class="data-card">
                    <div class="label">脱壳率</div>
                    <div class="value" style="color: #4ade80;"><span id="husking-rate">0</span><span class="unit">%</span></div>
                </div>
                <div class="data-card">
                    <div class="label">破碎率</div>
                    <div class="value" style="color: #f59e0b;"><span id="breakage-rate">0</span><span class="unit">%</span></div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>舂捣力优化设计</h2>
            <div class="controls">
                <select id="grain-type">
                    <option value="rice">水稻</option>
                    <option value="millet">小米</option>
                    <option value="wheat">小麦</option>
                </select>
                <button class="primary" id="btn-optimize">开始优化</button>
            </div>
            <div class="optimization-form">
                <label>基圆半径(m)</label>
                <input type="number" id="opt-base-radius" value="0.15" step="0.01" min="0.05" max="0.5">
                <label>升程(m)</label>
                <input type="number" id="opt-lift" value="0.12" step="0.01" min="0.02" max="0.3">
                <label>最大压力角(°)</label>
                <input type="number" id="opt-pressure-angle" value="30" step="1" min="10" max="60">
                <label>目标效率</label>
                <input type="number" id="opt-target-eff" value="0.85" step="0.01" min="0.5" max="0.99">
            </div>
            <div class="stats-grid" id="opt-results" style="display: none;">
                <div class="stat-item">
                    <div class="stat-label">优化后效率</div>
                    <div class="stat-value" id="opt-efficiency">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">凸轮类型</div>
                    <div class="stat-value" id="opt-profile-type">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最优基圆</div>
                    <div class="stat-value" id="opt-base-result">--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最优升程</div>
                    <div class="stat-value" id="opt-lift-result">--</div>
                </div>
            </div>
        </div>

        <div class="panel alerts-panel">
            <h2>告警信息</h2>
            <div id="alerts-list">
                <div style="text-align: center; color: #666; padding: 20px;">
                    暂无告警信息
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8080';
        const WS_URL = 'ws://localhost:8080/ws/alerts';

        let currentDevice = 'shuidui-001';
        let camAngle = 0;
        let animationSpeed = 1;
        let camProfileData = [];
        let forceHistory = [];
        let maxForceHistory = 50;
        let currentTab = 'profile';
        let isOptimizing = false;

        function init() {
            initThreeJS();
            initCamCanvas();
            initForceChart();
            loadCamProfile();
            connectWebSocket();
            setupEventListeners();
            animate();
            startDataPolling();
        }

        function setupEventListeners() {
            document.getElementById('device-select').addEventListener('change', (e) => {
                currentDevice = e.target.value;
                loadCamProfile();
                forceHistory = [];
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTab = btn.dataset.tab;
                    drawCamProfile();
                });
            });

            document.getElementById('btn-optimize').addEventListener('click', runOptimization);
        }

        let scene, camera, renderer;
        let waterWheel, cam, duitou, frame;

        function initThreeJS() {
            const canvas = document.getElementById('canvas-3d');
            const rect = canvas.parentElement.getBoundingClientRect();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 10, 30);

            camera = new THREE.PerspectiveCamera(60, rect.width / rect.height, 0.1, 1000);
            camera.position.set(5, 4, 6);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(rect.width, rect.height);
            renderer.shadowMap.enabled = true;

            const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xff6b35, 0.5, 20);
            pointLight.position.set(-3, 3, 2);
            scene.add(pointLight);

            const groundGeometry = new THREE.PlaneGeometry(15, 15);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x2d3436,
                roughness: 0.9,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const gridHelper = new THREE.GridHelper(10, 20, 0x444, 0x222);
            scene.add(gridHelper);

            frame = createFrame();
            scene.add(frame);

            waterWheel = createWaterWheel();
            waterWheel.position.set(-2, 2.5, 0);
            scene.add(waterWheel);

            cam = createCam();
            cam.position.set(0, 2.5, 0);
            scene.add(cam);

            duitou = createDuitou();
            duitou.position.set(0, 1.8, 0);
            scene.add(duitou);

            createGrainPit();

            window.addEventListener('resize', onWindowResize);
        }

        function createFrame() {
            const group = new THREE.Group();

            const pillarGeometry = new THREE.BoxGeometry(0.3, 4, 0.3);
            const pillarMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B4513,
                roughness: 0.7,
                metalness: 0.1
            });

            const positions = [
                [-1.5, 2, -0.8],
                [1.5, 2, -0.8],
                [-1.5, 2, 0.8],
                [1.5, 2, 0.8]
            ];

            positions.forEach(pos => {
                const pillar = new THREE.Mesh(pillarGeometry, pillarMaterial);
                pillar.position.set(...pos);
                pillar.castShadow = true;
                group.add(pillar);
            });

            const beamGeometry = new THREE.BoxGeometry(3.5, 0.25, 0.25);
            const beamMaterial = new THREE.MeshStandardMaterial({
                color: 0x654321,
                roughness: 0.8
            });

            const topBeam = new THREE.Mesh(beamGeometry, beamMaterial);
            topBeam.position.set(0, 3.9, 0);
            topBeam.castShadow = true;
            group.add(topBeam);

            const sideBeam1 = new THREE.Mesh(beamGeometry, beamMaterial);
            sideBeam1.position.set(0, 2.5, -0.8);
            sideBeam1.castShadow = true;
            group.add(sideBeam1);

            const sideBeam2 = new THREE.Mesh(beamGeometry, beamMaterial);
            sideBeam2.position.set(0, 2.5, 0.8);
            sideBeam2.castShadow = true;
            group.add(sideBeam2);

            return group;
        }

        function createWaterWheel() {
            const group = new THREE.Group();

            const wheelGeometry = new THREE.CylinderGeometry(1.2, 1.2, 0.6, 16);
            const wheelMaterial = new THREE.MeshStandardMaterial({
                color: 0x654321,
                roughness: 0.8,
                metalness: 0.1
            });
            const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheel.rotation.z = Math.PI / 2;
            wheel.castShadow = true;
            group.add(wheel);

            const bladeGeometry = new THREE.BoxGeometry(0.08, 0.8, 0.5);
            const bladeMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B4513,
                roughness: 0.9
            });

            for (let i = 0; i < 8; i++) {
                const blade = new THREE.Mesh(bladeGeometry, bladeMaterial);
                const angle = (i / 8) * Math.PI * 2;
                blade.position.set(
                    Math.cos(angle) * 1.0,
                    Math.sin(angle) * 1.0,
                    0
                );
                blade.rotation.z = angle;
                blade.castShadow = true;
                group.add(blade);
            }

            const axleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 12);
            const axleMaterial = new THREE.MeshStandardMaterial({
                color: 0x444,
                metalness: 0.8,
                roughness: 0.3
            });
            const axle = new THREE.Mesh(axleGeometry, axleMaterial);
            axle.rotation.z = Math.PI / 2;
            group.add(axle);

            return group;
        }

        function createCam() {
            const group = new THREE.Group();

            const baseRadius = 0.5;
            const lift = 0.3;
            const thickness = 0.2;

            const camShape = new THREE.Shape();
            const segments = 64;

            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                let r;
                if (angle < Math.PI) {
                    const t = angle / Math.PI;
                    r = baseRadius + lift * (1 - Math.cos(Math.PI * t)) / 2;
                } else {
                    const t = (angle - Math.PI) / Math.PI;
                    r = baseRadius + lift * (1 + Math.cos(Math.PI * t)) / 2;
                }
                const x = Math.cos(angle) * r;
                const y = Math.sin(angle) * r;
                if (i === 0) {
                    camShape.moveTo(x, y);
                } else {
                    camShape.lineTo(x, y);
                }
            }

            const extrudeSettings = {
                depth: thickness,
                bevelEnabled: false
            };

            const camGeometry = new THREE.ExtrudeGeometry(camShape, extrudeSettings);
            const camMaterial = new THREE.MeshStandardMaterial({
                color: 0xcd853f,
                metalness: 0.6,
                roughness: 0.4
            });
            const camMesh = new THREE.Mesh(camGeometry, camMaterial);
            camMesh.rotation.y = -Math.PI / 2;
            camMesh.position.z = -thickness / 2;
            camMesh.castShadow = true;
            group.add(camMesh);

            const hubGeometry = new THREE.CylinderGeometry(0.12, 0.12, thickness + 0.1, 16);
            const hubMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B7355,
                metalness: 0.5,
                roughness: 0.5
            });
            const hub = new THREE.Mesh(hubGeometry, hubMaterial);
            hub.rotation.x = Math.PI / 2;
            hub.castShadow = true;
            group.add(hub);

            return group;
        }

        function createDuitou() {
            const group = new THREE.Group();

            const headGeometry = new THREE.CylinderGeometry(0.3, 0.4, 0.5, 16);
            const headMaterial = new THREE.MeshStandardMaterial({
                color: 0x696969,
                metalness: 0.7,
                roughness: 0.3
            });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = -0.25;
            head.castShadow = true;
            group.add(head);

            const shaftGeometry = new THREE.CylinderGeometry(0.1, 0.12, 1.5, 12);
            const shaftMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B4513,
                roughness: 0.8
            });
            const shaft = new THREE.Mesh(shaftGeometry, shaftMaterial);
            shaft.position.y = 0.75;
            shaft.castShadow = true;
            group.add(shaft);

            const rollerGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.3, 12);
            const rollerMaterial = new THREE.MeshStandardMaterial({
                color: 0x444,
                metalness: 0.8,
                roughness: 0.2
            });
            const roller = new THREE.Mesh(rollerGeometry, rollerMaterial);
            roller.position.set(0, 1.5, 0);
            roller.rotation.z = Math.PI / 2;
            roller.castShadow = true;
            group.add(roller);

            return group;
        }

        function createGrainPit() {
            const pitGeometry = new THREE.CylinderGeometry(0.5, 0.45, 0.6, 24, 1, true);
            const pitMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B4513,
                roughness: 0.9,
                side: THREE.DoubleSide
            });
            const pit = new THREE.Mesh(pitGeometry, pitMaterial);
            pit.position.y = -0.3;
            pit.receiveShadow = true;
            scene.add(pit);

            const grainGeometry = new THREE.CylinderGeometry(0.45, 0.4, 0.3, 24);
            const grainMaterial = new THREE.MeshStandardMaterial({
                color: 0xf0e68c,
                roughness: 0.9
            });
            const grain = new THREE.Mesh(grainGeometry, grainMaterial);
            grain.position.y = -0.4;
            grain.name = 'grain';
            scene.add(grain);
        }

        function onWindowResize() {
            const canvas = document.getElementById('canvas-3d');
            const rect = canvas.parentElement.getBoundingClientRect();
            camera.aspect = rect.width / rect.height;
            camera.updateProjectionMatrix();
            renderer.setSize(rect.width, rect.height);
        }

        let camCtx, camCanvas;

        function initCamCanvas() {
            camCanvas = document.getElementById('cam-canvas');
            camCtx = camCanvas.getContext('2d');
            resizeCamCanvas();
            window.addEventListener('resize', resizeCamCanvas);
        }

        function resizeCamCanvas() {
            const rect = camCanvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            camCanvas.width = (rect.width - 30) * dpr;
            camCanvas.height = 180 * dpr;
            camCanvas.style.width = (rect.width - 30) + 'px';
            camCanvas.style.height = '180px';
            camCtx.scale(dpr, dpr);
            drawCamProfile();
        }

        function drawCamProfile() {
            const width = camCanvas.width / (window.devicePixelRatio || 1);
            const height = camCanvas.height / (window.devicePixelRatio || 1);

            camCtx.clearRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const maxRadius = Math.min(width, height) * 0.4;

            camCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            camCtx.lineWidth = 1;
            for (let i = 1; i <= 3; i++) {
                camCtx.beginPath();
                camCtx.arc(centerX, centerY, maxRadius * i / 3, 0, Math.PI * 2);
                camCtx.stroke();
            }

            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                camCtx.beginPath();
                camCtx.moveTo(centerX, centerY);
                camCtx.lineTo(
                    centerX + Math.cos(angle) * maxRadius,
                    centerY + Math.sin(angle) * maxRadius
                );
                camCtx.stroke();
            }

            if (camProfileData.length === 0) {
                camCtx.fillStyle = '#888';
                camCtx.font = '14px sans-serif';
                camCtx.textAlign = 'center';
                camCtx.fillText('加载中...', centerX, centerY);
                return;
            }

            let maxValue = 0;
            camProfileData.forEach(p => {
                let val;
                if (currentTab === 'profile') val = p.lift;
                else if (currentTab === 'velocity') val = Math.abs(p.velocity);
                else val = Math.abs(p.acceleration);
                if (val > maxValue) maxValue = val;
            });

            const baseRadius = 0.3 * maxRadius;

            camCtx.beginPath();
            camProfileData.forEach((p, i) => {
                const angle = p.angle * Math.PI / 180 - Math.PI / 2;
                let value;
                if (currentTab === 'profile') {
                    value = baseRadius + (p.lift / maxValue) * maxRadius * 0.7;
                } else if (currentTab === 'velocity') {
                    value = baseRadius + (Math.abs(p.velocity) / maxValue) * maxRadius * 0.7;
                } else {
                    value = baseRadius + (Math.abs(p.acceleration) / maxValue) * maxRadius * 0.7;
                }

                const x = centerX + Math.cos(angle) * value;
                const y = centerY + Math.sin(angle) * value;

                if (i === 0) {
                    camCtx.moveTo(x, y);
                } else {
                    camCtx.lineTo(x, y);
                }
            });
            camCtx.closePath();

            const gradient = camCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius);
            gradient.addColorStop(0, 'rgba(233, 69, 96, 0.1)');
            gradient.addColorStop(1, 'rgba(233, 69, 96, 0.3)');
            camCtx.fillStyle = gradient;
            camCtx.fill();

            camCtx.strokeStyle = '#e94560';
            camCtx.lineWidth = 2;
            camCtx.stroke();

            const currentAngleRad = (camAngle % 360) * Math.PI / 180 - Math.PI / 2;
            camCtx.strokeStyle = '#f39c12';
            camCtx.lineWidth = 2;
            camCtx.beginPath();
            camCtx.moveTo(centerX, centerY);
            camCtx.lineTo(
                centerX + Math.cos(currentAngleRad) * maxRadius,
                centerY + Math.sin(currentAngleRad) * maxRadius
            );
            camCtx.stroke();

            camCtx.fillStyle = '#f39c12';
            camCtx.beginPath();
            camCtx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            camCtx.fill();

            camCtx.fillStyle = '#aaa';
            camCtx.font = '12px sans-serif';
            camCtx.textAlign = 'left';
            camCtx.fillText(`最大值: ${maxValue.toFixed(4)}`, 10, 20);
        }

        let forceCtx, forceCanvas;

        function initForceChart() {
            forceCanvas = document.getElementById('force-chart');
            forceCtx = forceCanvas.getContext('2d');
            resizeForceChart();
            window.addEventListener('resize', resizeForceChart);
        }

        function resizeForceChart() {
            const rect = forceCanvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            forceCanvas.width = rect.width * dpr;
            forceCanvas.height = 200 * dpr;
            forceCanvas.style.width = rect.width + 'px';
            forceCanvas.style.height = '200px';
            forceCtx.scale(dpr, dpr);
        }

        function drawForceChart() {
            const width = forceCanvas.width / (window.devicePixelRatio || 1);
            const height = forceCanvas.height / (window.devicePixelRatio || 1);

            forceCtx.clearRect(0, 0, width, height);

            forceCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            forceCtx.fillRect(0, 0, width, height);

            forceCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            forceCtx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = height * i / 5;
                forceCtx.beginPath();
                forceCtx.moveTo(0, y);
                forceCtx.lineTo(width, y);
                forceCtx.stroke();
            }

            if (forceHistory.length < 2) return;

            const maxForce = Math.max(...forceHistory.map(d => d.force), 100);
            const barWidth = width / maxForceHistory - 2;

            forceHistory.forEach((d, i) => {
                const x = i * (width / maxForceHistory);
                const barHeight = (d.force / maxForce) * (height - 30);
                const y = height - barHeight - 10;

                const gradient = forceCtx.createLinearGradient(x, y, x, height - 10);
                if (d.force > 800) {
                    gradient.addColorStop(0, '#ef4444');
                    gradient.addColorStop(1, '#7f1d1d');
                } else if (d.force > 400) {
                    gradient.addColorStop(0, '#f59e0b');
                    gradient.addColorStop(1, '#92400e');
                } else {
                    gradient.addColorStop(0, '#4ade80');
                    gradient.addColorStop(1, '#166534');
                }

                forceCtx.fillStyle = gradient;
                forceCtx.fillRect(x + 1, y, barWidth, barHeight);
            });

            forceCtx.fillStyle = '#888';
            forceCtx.font = '11px sans-serif';
            forceCtx.textAlign = 'left';
            forceCtx.fillText(`${maxForce.toFixed(0)} N`, 5, 15);
            forceCtx.fillText('0 N', 5, height - 5);
        }

        async function loadCamProfile() {
            try {
                const response = await fetch(`${API_BASE}/api/cam-profile/${currentDevice}`);
                const data = await response.json();
                if (data.success && data.data) {
                    camProfileData = data.data;
                    drawCamProfile();
                }
            } catch (e) {
                console.error('Failed to load cam profile:', e);
                camProfileData = generateMockCamProfile();
                drawCamProfile();
            }
        }

        function generateMockCamProfile() {
            const points = [];
            const lift = 0.12;
            for (let i = 0; i < 360; i++) {
                const angle = i;
                const angleRad = angle * Math.PI / 180;
                let liftVal, velocity, acceleration;

                if (angleRad < Math.PI) {
                    const t = angleRad / Math.PI;
                    liftVal = lift * (1 - Math.cos(Math.PI * t)) / 2;
                    velocity = lift * Math.PI * Math.sin(Math.PI * t) / 2;
                    acceleration = lift * Math.PI * Math.PI * Math.cos(Math.PI * t) / 2;
                } else {
                    const t = (angleRad - Math.PI) / Math.PI;
                    liftVal = lift * (1 + Math.cos(Math.PI * t)) / 2;
                    velocity = -lift * Math.PI * Math.sin(Math.PI * t) / 2;
                    acceleration = -lift * Math.PI * Math.PI * Math.cos(Math.PI * t) / 2;
                }

                points.push({
                    angle,
                    radius: 0.15 + liftVal,
                    lift: liftVal,
                    velocity,
                    acceleration
                });
            }
            return points;
        }

        let ws;

        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    updateConnectionStatus('connected');
                };

                ws.onmessage = (event) => {
                    try {
                        const alert = JSON.parse(event.data);
                        addAlert(alert);
                    } catch (e) {
                        console.error('Failed to parse WS message:', e);
                    }
                };

                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    updateConnectionStatus('disconnected');
                    setTimeout(connectWebSocket, 3000);
                };

                ws.onerror = () => {
                    updateConnectionStatus('disconnected');
                };
            } catch (e) {
                console.error('WebSocket error:', e);
            }
        }

        function updateConnectionStatus(status) {
            const dot = document.getElementById('connection-status');
            const text = document.getElementById('connection-text');

            if (status === 'connected') {
                dot.className = 'status-dot';
                text.textContent = '系统运行中';
            } else {
                dot.className = 'status-dot warning';
                text.textContent = '连接断开';
            }
        }

        function addAlert(alert) {
            const list = document.getElementById('alerts-list');

            if (list.querySelector('.text-center')) {
                list.innerHTML = '';
            }

            const item = document.createElement('div');
            item.className = `alert-item ${alert.alert_level}`;

            const time = new Date(alert.timestamp || Date.now()).toLocaleTimeString();

            item.innerHTML = `
                <div class="alert-header">
                    <span class="alert-type">${alert.alert_type || '未知告警'}</span>
                    <span class="alert-time">${time}</span>
                </div>
                <div class="alert-msg">${alert.alert_message || ''}</div>
            `;

            list.insertBefore(item, list.firstChild);

            while (list.children.length > 20) {
                list.removeChild(list.lastChild);
            }

            if (alert.alert_level === 'critical') {
                document.getElementById('vibration-card')?.classList.add('critical');
            }
        }

        async function runOptimization() {
            if (isOptimizing) return;

            isOptimizing = true;
            const btn = document.getElementById('btn-optimize');
            btn.textContent = '优化中...';
            btn.disabled = true;

            const request = {
                device_id: currentDevice,
                target_efficiency: parseFloat(document.getElementById('opt-target-eff').value),
                grain_type: document.getElementById('grain-type').value,
                constraints: {
                    max_cam_radius: parseFloat(document.getElementById('opt-base-radius').value) * 1.5,
                    min_cam_radius: 0.05,
                    max_lift: parseFloat(document.getElementById('opt-lift').value) * 1.5,
                    max_pressure_angle: parseFloat(document.getElementById('opt-pressure-angle').value) * Math.PI / 180
                }
            };

            try {
                const response = await fetch(`${API_BASE}/api/optimize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                const data = await response.json();

                if (data.success && data.data) {
                    const result = data.data;
                    document.getElementById('opt-results').style.display = 'grid';
                    document.getElementById('opt-efficiency').textContent = (result.actual_efficiency * 100).toFixed(1) + '%';
                    document.getElementById('opt-profile-type').textContent = getProfileTypeName(result.cam_profile_type);
                    document.getElementById('opt-base-result').textContent = result.cam_base_radius.toFixed(3) + 'm';
                    document.getElementById('opt-lift-result').textContent = result.cam_lift.toFixed(3) + 'm';

                    if (result.cam_profile_points) {
                        camProfileData = result.cam_profile_points;
                        drawCamProfile();
                    }
                }
            } catch (e) {
                console.error('Optimization failed:', e);

                const mockResult = mockOptimization();
                document.getElementById('opt-results').style.display = 'grid';
                document.getElementById('opt-efficiency').textContent = (mockResult.efficiency * 100).toFixed(1) + '%';
                document.getElementById('opt-profile-type').textContent = '摆线凸轮';
                document.getElementById('opt-base-result').textContent = mockResult.baseRadius.toFixed(3) + 'm';
                document.getElementById('opt-lift-result').textContent = mockResult.lift.toFixed(3) + 'm';
            }

            isOptimizing = false;
            btn.textContent = '开始优化';
            btn.disabled = false;
        }

        function getProfileTypeName(type) {
            const names = {
                'cycloidal': '摆线凸轮',
                'harmonic': '简谐凸轮',
                'trapezoidal': '梯形加速度凸轮',
                'polynomial': '多项式凸轮'
            };
            return names[type] || type;
        }

        function mockOptimization() {
            return {
                efficiency: 0.87,
                baseRadius: 0.18,
                lift: 0.14
            };
        }

        function startDataPolling() {
            setInterval(() => {
                fetchLatestData();
            }, 1000);
        }

        async function fetchLatestData() {
            try {
                const response = await fetch(`${API_BASE}/api/sensor-data?device_id=${currentDevice}&limit=1`);
                const data = await response.json();
                if (data.success && data.data && data.data.length > 0) {
                    updateSensorDisplay(data.data[0]);
                }
            } catch (e) {
            }
        }

        function updateSensorDisplay(sensor) {
            document.getElementById('cam-angle-display').textContent = sensor.cam_angle.toFixed(1) + '°';
            document.getElementById('duitou-position').textContent = sensor.duitou_position.toFixed(3) + ' m';
            document.getElementById('wheel-speed').textContent = sensor.water_wheel_speed.toFixed(2) + ' rad/s';
            document.getElementById('vibration-value').textContent = sensor.frame_vibration_total.toFixed(2);

            const vibCard = document.getElementById('vibration-card');
            vibCard.classList.remove('warning', 'critical');
            if (sensor.frame_vibration_total > 8) {
                vibCard.classList.add('critical');
            } else if (sensor.frame_vibration_total > 5) {
                vibCard.classList.add('warning');
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            camAngle += 1.5 * animationSpeed;
            if (camAngle >= 360) camAngle -= 360;

            const angleRad = camAngle * Math.PI / 180;
            const lift = 0.3;
            let duitouLift;

            if (angleRad < Math.PI) {
                const t = angleRad / Math.PI;
                duitouLift = lift * (1 - Math.cos(Math.PI * t)) / 2;
            } else {
                const t = (angleRad - Math.PI) / Math.PI;
                duitouLift = lift * (1 + Math.cos(Math.PI * t)) / 2;
            }

            if (waterWheel) {
                waterWheel.rotation.z -= 0.03 * animationSpeed;
            }
            if (cam) {
                cam.rotation.z = -angleRad;
            }
            if (duitou) {
                duitou.position.y = 1.8 + duitouLift;
            }

            const instantaneousForce = 25 * 9.81 + Math.abs(Math.sin(angleRad * 2)) * 500;

            forceHistory.push({
                time: Date.now(),
                force: instantaneousForce
            });

            if (forceHistory.length > maxForceHistory) {
                forceHistory.shift();
            }

            document.getElementById('pounding-force').textContent = instantaneousForce.toFixed(0);

            const impactEnergy = 0.5 * 25 * Math.abs(Math.sin(angleRad)) * 2;
            document.getElementById('impact-energy').textContent = impactEnergy.toFixed(2);

            const huskingRate = 70 + Math.abs(Math.sin(angleRad)) * 20;
            const breakageRate = 5 + Math.abs(Math.sin(angleRad)) * 8;
            document.getElementById('husking-rate').textContent = huskingRate.toFixed(1);
            document.getElementById('breakage-rate').textContent = breakageRate.toFixed(1);

            drawCamProfile();
            drawForceChart();

            if (renderer) {
                renderer.render(scene, camera);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
